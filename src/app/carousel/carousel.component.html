<div class="carousel"
     [style.transform]="transformStyle()"
     (dragstart)="onSwipeStart($event)"
     (pointerdown)="onSwipeStart($event)"
     (touchstart)="onTouchStart($event)"
     (drag)="onSwipeMove($event)"
     (pointermove)="onSwipeMove($event)"
     (touchmove)="onTouchMove($event)"
     (dragend)="onSwipeEnd()"
     (pointerup)="onSwipeEnd()"
     (touchend)="onSwipeEnd()">
  @for (slide of slides(); track slide.title) {
    <app-slide [config]="slide"></app-slide>
  }
</div>
